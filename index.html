<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anyhenge</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f3f4f6;
    }

    #map {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: var(--panel-h, 120px);
    }

    /* ── SVG sun line overlay ── */
    #sun-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: var(--panel-h, 120px);
      pointer-events: none;
      z-index: 400;
    }

    /* ── crosshair at map center ── */
    #crosshair {
      position: fixed;
      top: calc((var(--vh, 100vh) - var(--panel-h, 120px)) / 2);
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 500;
    }
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(0, 0, 0, 0.75);
    }
    #crosshair::before {
      width: 1.5px;
      height: 100%;
      left: calc(50% - 0.75px);
      top: 0;
    }
    #crosshair::after {
      height: 1.5px;
      width: 100%;
      top: calc(50% - 0.75px);
      left: 0;
    }
    /* circle ring around crosshair */
    #crosshair-ring {
      position: fixed;
      top: calc((var(--vh, 100vh) - var(--panel-h, 120px)) / 2);
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1.5px solid rgba(0, 0, 0, 0.75);
      pointer-events: none;
      z-index: 500;
    }

    /* ── floating control panel ── */
    #panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(15, 15, 15, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 20px 28px 24px;
    }

    #readout {
      display: flex;
      gap: 32px;
      font-size: 1rem;
      color: #9ca3af;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    #readout span {
      white-space: nowrap;
    }

    #readout .val {
      color: #f3f4f6;
      font-variant-numeric: tabular-nums;
    }

    #readout .val.amber { color: #f59e0b; }

    /* ── sliders ── */
    #sliders {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px 24px;
    }

    .slider-group {
      display: flex;
      align-items: center;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: #374151;
      outline: none;
      cursor: pointer;
      margin: 8px 0;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
      border: 3px solid #0f0f0f;
    }

    input[type=range]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
      border: 3px solid #0f0f0f;
    }

    /* ── pulsing user location dot (via Leaflet divIcon) ── */
    .user-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #3b82f6;
      border: 2px solid #fff;
      box-shadow: 0 0 0 0 rgba(59,130,246,0.6);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(59,130,246,0.6); }
      70%  { box-shadow: 0 0 0 10px rgba(59,130,246,0);   }
      100% { box-shadow: 0 0 0 0   rgba(59,130,246,0);    }
    }

    /* hide Leaflet attribution branding a bit */
    .leaflet-control-attribution {
      font-size: 10px !important;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- SVG overlay: sun line is drawn here, always centered in the visible map area -->
<svg id="sun-overlay" xmlns="http://www.w3.org/2000/svg">
  <line id="sun-line" x1="0" y1="0" x2="0" y2="0"
    stroke="#d97706" stroke-width="2.5" stroke-opacity="0.9"
    stroke-linecap="round" />
</svg>

<div id="crosshair"></div>
<div id="crosshair-ring"></div>

<div id="panel">
  <div id="readout">
    <span>date <span class="val" id="lbl-date">—</span></span>
    <span>azimuth <span class="val" id="r-az">—</span>°</span>
    <span>sunset <span class="val" id="r-sunset">—</span></span>
    <span>center <span class="val" id="r-center">—</span></span>
    <span>zoom <span class="val" id="r-zoom">—</span></span>
  </div>

  <div id="sliders">
    <div class="slider-group">
      <input type="range" id="sl-date" min="0" max="364" value="0" />
    </div>
  </div>
</div>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

// Format a Date as "HH:MM" in local time
function fmtTime(d) {
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

// Format a Date as "Mon Jan 1"
function fmtDate(d) {
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

// ── state ─────────────────────────────────────────────────────────────────────

const now = new Date();
const year = now.getFullYear();

// day-of-year (0-indexed)
function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000) - 1;
}

// Return the sunset Date for a given day-of-year and lat/lng
function sunsetForDoy(doy, lat, lng) {
  const d = new Date(year, 0, 1 + doy);
  const times = SunCalc.getTimes(d, lat, lng);
  return times.sunsetStart;
}

// ── hash state ────────────────────────────────────────────────────────────────

// Hash format: #lat,lng,zoom,doy  e.g. #40.7549,-73.9840,13,72
function parseHash() {
  const h = window.location.hash.slice(1);
  if (!h) return null;
  const parts = h.split(',');
  if (parts.length !== 4) return null;
  const [lat, lng, zoom, doy] = parts.map(Number);
  if ([lat, lng, zoom, doy].some(isNaN)) return null;
  return { lat, lng, zoom, doy: Math.min(Math.max(Math.round(doy), 0), 364) };
}

function updateHash() {
  const c = map.getCenter();
  const z = map.getZoom();
  window.location.replace(
    `#${c.lat.toFixed(4)},${c.lng.toFixed(4)},${z},${currentDoy}`
  );
}

// Restore from hash or fall back to defaults
const fromHash = parseHash();
const initLat  = fromHash ? fromHash.lat  : 40.7549;
const initLng  = fromHash ? fromHash.lng  : -73.9840;
const initZoom = fromHash ? fromHash.zoom : 13;
let currentDoy = fromHash ? fromHash.doy  : Math.min(dayOfYear(now), 364);

// ── map setup ─────────────────────────────────────────────────────────────────

const map = L.map('map', { zoomControl: true, attributionControl: true })
  .setView([initLat, initLng], initZoom);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
  }
).addTo(map);

// User location marker
let userMarker = null;

const userIcon = L.divIcon({
  className: '',
  html: '<div class="user-dot"></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7]
});

// ── sun line rendering (SVG overlay) ─────────────────────────────────────────

const sunLineEl = document.getElementById('sun-line');

function updateSunLine() {
  const center = map.getCenter();
  const lat = center.lat;
  const lng = center.lng;

  const sunset = sunsetForDoy(currentDoy, lat, lng);
  const pos = SunCalc.getPosition(sunset, lat, lng);

  // SunCalc azimuth: 0 = south, positive = west (radians)
  // Convert to compass bearing (0 = north, clockwise)
  const bearing = (toDeg(pos.azimuth) + 180 + 360) % 360;

  // SVG overlay covers the visible map area (full width, above panel).
  // Center point in SVG coords = middle of that rect.
  const panelH = parseFloat(
    getComputedStyle(document.documentElement).getPropertyValue('--panel-h')
  ) || 120;
  const W = window.innerWidth;
  const H = window.innerHeight - panelH;
  const cx = W / 2;
  const cy = H / 2;

  // Keep the SVG coordinate space in sync with its CSS size
  const overlay = document.getElementById('sun-overlay');
  overlay.setAttribute('width', W);
  overlay.setAttribute('height', H);
  overlay.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Convert compass bearing to SVG angle:
  // bearing 0° = north = up = SVG -Y direction
  // bearing 90° = east = right = SVG +X direction
  // SVG angle from positive-X axis = bearing - 90°
  const angleRad = toRad(bearing - 90);

  // Extend far enough to exit the SVG in both directions
  const r = Math.sqrt(W * W + H * H);
  const dx = Math.cos(angleRad) * r;
  const dy = Math.sin(angleRad) * r;

  sunLineEl.setAttribute('x1', cx - dx);
  sunLineEl.setAttribute('y1', cy - dy);
  sunLineEl.setAttribute('x2', cx + dx);
  sunLineEl.setAttribute('y2', cy + dy);

  // Update readout
  document.getElementById('r-az').textContent = bearing.toFixed(1);
  document.getElementById('r-sunset').textContent = fmtTime(sunset);
  document.getElementById('r-center').textContent =
    `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  document.getElementById('r-zoom').textContent = map.getZoom();

  updateHash();
}

// ── slider wiring ─────────────────────────────────────────────────────────────

const slDate = document.getElementById('sl-date');

slDate.value = currentDoy;
slDate.max = (new Date(year, 11, 31) - new Date(year, 0, 1)) / 86400000; // 364 or 365 for leap years

function refreshLabels() {
  const d = new Date(year, 0, 1 + currentDoy);
  document.getElementById('lbl-date').textContent = fmtDate(d);
}

slDate.addEventListener('input', () => {
  currentDoy = parseInt(slDate.value, 10);
  refreshLabels();
  updateSunLine();
});

// ── map event wiring ──────────────────────────────────────────────────────────

// Pan: azimuth changes slightly as lat/lng changes — update on moveend only
// (no need to track every pixel since the line is screen-fixed anyway)
map.on('moveend', updateSunLine);
map.on('zoomend', updateSunLine);

// ── geolocation ───────────────────────────────────────────────────────────────

function onLocation(latlng) {
  map.setView(latlng, 14);

  if (userMarker) userMarker.remove();
  userMarker = L.marker(latlng, { icon: userIcon, interactive: false }).addTo(map);

  refreshLabels();
  updateSunLine();
}

// Always geolocate to show user marker.
// If a hash was provided, don't pan to the user's location — just place the dot.
map.locate({ enableHighAccuracy: true });
map.on('locationfound', e => {
  if (userMarker) userMarker.remove();
  userMarker = L.marker(e.latlng, { icon: userIcon, interactive: false }).addTo(map);
  if (!fromHash) {
    map.setView(e.latlng, 14);
    refreshLabels();
    updateSunLine();
  }
});
map.on('locationerror', () => {
  refreshLabels();
  updateSunLine();
});

if (fromHash) {
  refreshLabels();
  updateSunLine();
}

// ── panel height → CSS var + map resize ──────────────────────────────────────

function syncPanelHeight() {
  const h = document.getElementById('panel').offsetHeight;
  document.documentElement.style.setProperty('--panel-h', h + 'px');
  // --vh uses window.innerHeight (actual visible height on mobile browsers)
  // rather than 100vh which on iOS Safari is the max possible height
  document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
  map.invalidateSize({ pan: false });
}

window.addEventListener('resize', () => { syncPanelHeight(); updateSunLine(); });

// ── initial render ────────────────────────────────────────────────────────────

syncPanelHeight();
refreshLabels();
updateSunLine();
</script>
</body>
</html>
